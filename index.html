<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Space Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Evita que se seleccione texto o aparezca el menú contextual al mantener pulsado en móvil */
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        /* Estilos para el efecto de volteo de las cartas */
        .card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
            width: 100%;
            height: 100%;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .card-back {
            background-color: #1e293b; 
            border: 2px solid #334155;
        }
        .card-front {
            background-color: white;
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen font-sans text-white flex flex-col items-center p-4">

    <!-- Encabezado del Juego -->
    <header class="text-center my-6 md:my-8">
        <h1 class="text-3xl md:text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 uppercase">
            Space Memory
        </h1>
        <div class="flex gap-4 md:gap-8 mt-4 justify-center">
            <div class="bg-slate-900 px-3 py-1.5 md:px-4 md:py-2 rounded-full border border-slate-800">
                <span class="text-slate-400 text-[10px] md:text-xs uppercase font-bold tracking-wider">Intentos</span>
                <span id="moves" class="ml-2 font-mono text-lg md:text-xl text-cyan-400">0</span>
            </div>
            <div class="bg-slate-900 px-3 py-1.5 md:px-4 md:py-2 rounded-full border border-slate-800">
                <span class="text-slate-400 text-[10px] md:text-xs uppercase font-bold tracking-wider">Aciertos</span>
                <span id="matches" class="ml-2 font-mono text-lg md:text-xl text-emerald-400">0</span>
            </div>
        </div>
    </header>

    <!-- Tablero de Juego -->
    <main id="game-board" class="grid grid-cols-4 gap-2 md:gap-3 max-w-md w-full aspect-square">
        <!-- Las cartas se generan dinámicamente -->
    </main>

    <div class="mt-8 md:mt-12 flex flex-col items-center gap-6 w-full">
        <button onclick="resetGame()" class="w-full max-w-xs bg-gradient-to-b from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 px-8 py-3.5 rounded-2xl font-black shadow-lg shadow-cyan-900/20 transition-all transform active:scale-95 text-sm uppercase tracking-widest">
            Reiniciar Misión
        </button>

        <!-- Footer Personalizado -->
        <footer class="text-center pb-6">
            <div class="h-px w-24 bg-gradient-to-r from-transparent via-slate-700 to-transparent mx-auto mb-4"></div>
            <p class="text-slate-500 text-[10px] md:text-sm font-medium tracking-wide">
                &copy; <span id="year"></span> <span class="text-cyan-500/80">javilindj</span> — Todos los derechos reservados
            </p>
        </footer>
    </div>

    <!-- Pantalla de Victoria -->
    <div id="win-modal" class="fixed inset-0 bg-slate-950/95 hidden flex items-center justify-center z-50 p-6 backdrop-blur-sm">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl text-center max-w-sm w-full shadow-2xl">
            <div class="text-6xl mb-4 animate-bounce">🚀</div>
            <h2 class="text-3xl font-black mb-2 text-white italic">¡MISIÓN CUMPLIDA!</h2>
            <p class="text-slate-400 mb-8 text-sm">Entrenamiento de memoria galáctica finalizado con éxito.</p>
            <button onclick="resetGame()" class="w-full py-4 bg-cyan-500 hover:bg-cyan-400 text-white font-black rounded-xl transition-colors shadow-lg shadow-cyan-500/20 uppercase tracking-widest">
                Jugar otra vez
            </button>
        </div>
    </div>

    <script>
        // Emojis de temática espacial
        const icons = ['🚀', '👨‍🚀', '👽', '🪐', '🌟', '📡', '🛰️', '☄️'];
        let flippedCards = [];
        let moves = 0;
        let matches = 0;
        let lockBoard = false;

        const board = document.getElementById('game-board');
        const movesEl = document.getElementById('moves');
        const matchesEl = document.getElementById('matches');
        const winModal = document.getElementById('win-modal');

        function init() {
            // Actualizar año
            document.getElementById('year').textContent = new Date().getFullYear();

            // Preparar iconos
            const gameIcons = [...icons, ...icons];
            gameIcons.sort(() => Math.random() - 0.5);

            board.innerHTML = '';
            gameIcons.forEach((icon) => {
                const card = document.createElement('div');
                // Ajuste de altura responsivo: h-20 en móvil pequeño, h-24+ en normal
                card.className = 'card cursor-pointer group h-20 sm:h-28';
                card.dataset.icon = icon;
                card.innerHTML = `
                    <div class="card-inner w-full h-full">
                        <div class="card-back text-xl md:text-2xl">🌌</div>
                        <div class="card-front text-3xl md:text-4xl">${icon}</div>
                    </div>
                `;
                // Usamos touchstart para una respuesta más rápida en móvil (opcional, click suele bastar)
                card.onclick = () => flipCard(card);
                board.appendChild(card);
            });
        }

        function flipCard(card) {
            if (lockBoard) return;
            if (card.classList.contains('flipped')) return;
            if (flippedCards.length === 2) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            moves++;
            movesEl.innerText = moves;
            lockBoard = true;

            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.icon === card2.dataset.icon;

            if (isMatch) {
                matches++;
                matchesEl.innerText = matches;
                disableCards();
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            flippedCards = [];
            lockBoard = false;
            if (matches === icons.length) {
                setTimeout(() => {
                    winModal.classList.remove('hidden');
                }, 600);
            }
        }

        function unflipCards() {
            setTimeout(() => {
                flippedCards.forEach(card => card.classList.remove('flipped'));
                flippedCards = [];
                lockBoard = false;
            }, 1000);
        }

        function resetGame() {
            moves = 0;
            matches = 0;
            movesEl.innerText = '0';
            matchesEl.innerText = '0';
            flippedCards = [];
            lockBoard = false;
            winModal.classList.add('hidden');
            init();
        }

        window.onload = init;
    </script>
</body>
</html>
