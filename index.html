<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Memory Adventure - javilindj</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Optimizaciones para móviles */
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
            background-color: #020617;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Estructura 3D de la carta */
        .card {
            perspective: 1000px;
        }

        .card-inner {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
            width: 100%;
            height: 100%;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        /* Lado oculto (Azul Galaxia) */
        .card-back {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 3px solid #334155;
            color: #38bdf8;
        }

        /* Lado revelado (Blanco con icono) */
        .card-front {
            background-color: #ffffff;
            transform: rotateY(180deg);
            border: 3px solid #f1f5f9;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-pop {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body class="min-h-screen text-white flex flex-col items-center p-4">

    <!-- Marcadores -->
    <header class="text-center my-6 w-full max-w-md">
        <h1 class="text-4xl font-extrabold tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 uppercase italic">
            Space Memory
        </h1>
        
        <div class="flex gap-4 mt-6 justify-center">
            <div class="bg-slate-900/80 backdrop-blur-md px-6 py-3 rounded-2xl border border-slate-800 flex flex-col items-center flex-1">
                <span class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Intentos</span>
                <span id="moves" class="font-mono text-3xl text-cyan-400 leading-none mt-1">0</span>
            </div>
            <div class="bg-slate-900/80 backdrop-blur-md px-6 py-3 rounded-2xl border border-slate-800 flex flex-col items-center flex-1">
                <span class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Aciertos</span>
                <span id="matches" class="font-mono text-3xl text-emerald-400 leading-none mt-1">0</span>
            </div>
        </div>
    </header>

    <!-- Tablero 4x4 -->
    <main id="game-board" class="grid grid-cols-4 gap-3 max-w-md w-full aspect-square px-2">
        <!-- Generado por JavaScript -->
    </main>

    <!-- Botón y Firma -->
    <div class="mt-16 flex flex-col items-center gap-10 w-full mb-10">
        <!-- Botón actualizado a verde con mayor margen superior -->
        <button onclick="resetGame()" class="w-full max-w-xs bg-gradient-to-r from-emerald-600 to-teal-700 hover:from-emerald-500 hover:to-teal-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl shadow-emerald-900/40 transition-all active:scale-95 text-sm uppercase tracking-widest">
            Reiniciar Misión
        </button>

        <footer class="text-center">
            <div class="h-px w-32 bg-gradient-to-r from-transparent via-slate-700 to-transparent mx-auto mb-4"></div>
            <p class="text-slate-500 text-xs font-bold tracking-widest uppercase">
                &copy; <span id="year"></span> <span class="text-cyan-500">javilindj</span>
            </p>
        </footer>
    </div>

    <!-- Pantalla de Victoria -->
    <div id="win-modal" class="fixed inset-0 bg-slate-950/95 hidden flex items-center justify-center z-50 p-6 backdrop-blur-xl">
        <div class="bg-slate-900 border border-slate-800 p-10 rounded-[2.5rem] text-center max-w-sm w-full shadow-2xl animate-pop">
            <div class="text-8xl mb-6">🚀</div>
            <h2 class="text-4xl font-black mb-3 text-white tracking-tighter italic uppercase">¡ÉXITO!</h2>
            <p class="text-slate-400 mb-8 text-sm leading-relaxed">Entrenamiento finalizado. El universo te espera, astronauta.</p>
            <button onclick="resetGame()" class="w-full py-4 bg-emerald-500 hover:bg-emerald-400 text-white font-black rounded-2xl uppercase tracking-widest shadow-lg shadow-emerald-500/30 transition-transform active:scale-95">
                Nueva Misión
            </button>
        </div>
    </div>

    <script>
        const icons = ['🚀', '👨‍🚀', '👽', '🪐', '🌟', '📡', '🛰️', '☄️'];
        let flippedCards = [];
        let moves = 0;
        let matches = 0;
        let lockBoard = false;

        function init() {
            document.getElementById('year').textContent = new Date().getFullYear();
            const gameIcons = [...icons, ...icons].sort(() => Math.random() - 0.5);
            const board = document.getElementById('game-board');
            board.innerHTML = '';

            gameIcons.forEach((icon) => {
                const card = document.createElement('div');
                card.className = 'card cursor-pointer h-24 sm:h-28';
                card.dataset.icon = icon;
                card.innerHTML = `
                    <div class="card-inner w-full h-full">
                        <div class="card-back text-5xl sm:text-6xl">🌌</div>
                        <div class="card-front text-5xl sm:text-6xl">${icon}</div>
                    </div>
                `;
                card.onclick = () => flipCard(card);
                board.appendChild(card);
            });
        }

        function flipCard(card) {
            if (lockBoard || card.classList.contains('flipped') || flippedCards.length === 2) return;
            card.classList.add('flipped');
            flippedCards.push(card);
            if (flippedCards.length === 2) checkMatch();
        }

        function checkMatch() {
            moves++;
            document.getElementById('moves').innerText = moves;
            lockBoard = true;
            const [c1, c2] = flippedCards;
            if (c1.dataset.icon === c2.dataset.icon) {
                matches++;
                document.getElementById('matches').innerText = matches;
                flippedCards = [];
                lockBoard = false;
                if (matches === icons.length) setTimeout(() => document.getElementById('win-modal').classList.remove('hidden'), 500);
            } else {
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    flippedCards = [];
                    lockBoard = false;
                }, 1000);
            }
        }

        function resetGame() {
            moves = 0; matches = 0;
            document.getElementById('moves').innerText = '0';
            document.getElementById('matches').innerText = '0';
            document.getElementById('win-modal').classList.add('hidden');
            flippedCards = []; lockBoard = false;
            init();
        }

        window.onload = init;
    </script>
</body>
</html>
